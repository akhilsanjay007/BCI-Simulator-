# CI validates every push/PR to main. CD publishes immutable Docker images only
# after main is green; Railway still builds directly from this repo's Dockerfiles.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  frontend:
    name: Frontend (npm ci + build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  publish-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Railway deploys from GitHub and rebuilds these Dockerfiles itself.
      # We still publish GHCR images as a production artifact: each green main
      # commit gets an immutable image tag for rollback, debugging, scanning,
      # and parity checks outside Railway.
      - name: Image prefix (GHCR — strong sanitization)
        id: img
        run: |
          set -euo pipefail
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-$//')
          repo=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-$//')
          if [ -z "$repo" ]; then repo="bci-simulator"; fi
          echo "prefix=${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "Sanitized prefix: ${owner}/${repo}"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.prefix }}/backend:latest
            ghcr.io/${{ steps.img.outputs.prefix }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_ORIGIN=http://localhost:8000
          tags: |
            ghcr.io/${{ steps.img.outputs.prefix }}/frontend:latest
            ghcr.io/${{ steps.img.outputs.prefix }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

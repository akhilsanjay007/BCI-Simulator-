server {
    # Railway routes HTTP traffic to the container's port 80 for this image.
    listen 80;
    listen [::]:80;
    server_name _;

    # Vite writes the production React bundle here during the Docker build.
    root /usr/share/nginx/html;
    index index.html;

    # Basic hardening for a static app without blocking external API/WebSocket origins.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Compressed text assets reduce startup and dashboard load time.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Fingerprinted Vite assets are safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Keep the SPA shell fresh so Railway deploys are picked up immediately.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # React Router / SPA fallback: serve index.html for client-side routes.
    # The dashboard connects to the backend WebSocket directly via VITE_API_ORIGIN,
    # so this static server should not terminate or proxy WebSocket traffic.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

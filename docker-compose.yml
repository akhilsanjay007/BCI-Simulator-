# Local full stack: FastAPI (8000) + static SPA (3000).
# Usage: docker compose up --build

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENV: development
      # Async Redis client (Streams buffering). Overridable for prod.
      REDIS_URL: redis://redis:6379/0
      REDIS_STREAM_SIGNALS: bci:signals
      REDIS_STREAM_RETENTION_SECONDS: "20"
      REDIS_MAX_CONNECTIONS: "50"
    depends_on:
      redis:
        condition: service_healthy
    # Optional: use host weights instead of image COPY/LFS (uncomment after `git lfs pull`)
    # volumes:
    #   - ./models:/app/models:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser calls this origin for REST + WebSocket (host port mapping keeps default valid).
        VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 25
    restart: unless-stopped
